name: Deploy Thai Tien Shop to AWS

on:
  push:
    branches: [ master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH Key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to Server
        run: |
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no ${{ secrets.USERNAME }}@${{ secrets.HOST }} << 'EOF'
            set -e
            if [ ! -d "thaitienshop" ]; then
              git clone https://oauth2:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git thaitienshop
            fi
            cd thaitienshop
            git remote set-url origin https://oauth2:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
            git pull origin master
            
            # Xóa thư mục frontend vì đã deploy lên Vercel
            rm -rf frontend
            
            # Tạo file .env bí mật ngay trên server
            echo "DATABASE_URL=mysql://root:${{ secrets.MYSQL_ROOT_PASSWORD }}@db:3306/thaitienshop" > .env
            echo "MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}" >> .env
            echo "JWT_ACCESS_SECRET=${{ secrets.JWT_ACCESS_SECRET }}" >> .env
            echo "JWT_REFRESH_SECRET=${{ secrets.JWT_REFRESH_SECRET }}" >> .env
            echo "JWT_ACCESS_EXPIRES_IN=15m" >> .env
            echo "JWT_REFRESH_EXPIRES_IN=7d" >> .env
            echo "RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}" >> .env
            echo "GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}" >> .env
            echo "GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}" >> .env
            echo "GOOGLE_CALLBACK_URL=https://www.thaitienshop.id.vn/auth/google/callback" >> .env
            
            # Dọn dẹp container cũ (tránh lỗi Conflict)
            sudo docker compose down --remove-orphans 2>/dev/null || true
            sudo docker rm -f thaitien_backend thaitien_db thaitien_redis 2>/dev/null || true
            sudo docker container prune -f 2>/dev/null || true
            
            # Khởi động hệ thống
            sudo docker compose up -d --build
            sudo docker image prune -f
          EOF