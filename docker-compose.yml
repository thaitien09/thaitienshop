services:
  db:
    image: mysql:8.0
    container_name: thaitien_db
    restart: always
    environment:
      MYSQL_DATABASE: thaitienshop
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "3307:3306"
    volumes:
      - thaitien_db_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password --innodb_buffer_pool_size=256M

  backend:
    build: ./backend
    container_name: thaitien_backend
    restart: always
    ports:
      - "3000:3000"
    env_file: .env
    depends_on:
      - db
      - redis

  redis:
    image: redis:alpine
    container_name: thaitien_redis
    restart: always
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"

volumes:
  thaitien_db_data:
