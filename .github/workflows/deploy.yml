name: Deploy Thai Tien Shop to AWS

on:
  push:
    branches: [ master ]
    paths:
      - 'backend/**'
      - 'docker-compose.yml'
      - '.github/workflows/deploy.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH Key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to Server
        run: |
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no ${{ secrets.USERNAME }}@${{ secrets.HOST }} << 'EOF'
            set -e
            if [ ! -d "thaitienshop" ]; then
              git clone https://oauth2:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git thaitienshop
            fi
            cd thaitienshop
            git remote set-url origin https://oauth2:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
            git pull origin master
            rm -rf frontend

            # Tạo file .env bằng printf để tránh lỗi heredoc thụt lề
            printf "DATABASE_URL=mysql://root:${{ secrets.MYSQL_ROOT_PASSWORD }}@db:3306/thaitienshop\n" > .env
            printf "MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}\n" >> .env
            printf "JWT_ACCESS_SECRET=${{ secrets.JWT_ACCESS_SECRET }}\n" >> .env
            printf "JWT_REFRESH_SECRET=${{ secrets.JWT_REFRESH_SECRET }}\n" >> .env
            printf "JWT_ACCESS_EXPIRES_IN=15m\n" >> .env
            printf "JWT_REFRESH_EXPIRES_IN=7d\n" >> .env
            printf "RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}\n" >> .env
            printf "GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}\n" >> .env
            printf "GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}\n" >> .env
            printf "GOOGLE_CALLBACK_URL=https://www.thaitienshop.id.vn/auth/google/callback\n" >> .env
            printf "AWS_REGION=${{ secrets.AWS_REGION }}\n" >> .env
            printf "AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}\n" >> .env
            printf "AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}\n" >> .env
            printf "AWS_S3_BUCKET_NAME=${{ secrets.AWS_S3_BUCKET_NAME }}\n" >> .env

            # Build và khởi động lại
            sudo docker compose build --pull backend
            
            # Xóa container backend cũ nếu còn tồn tại để tránh xung đột tên
            sudo docker rm -f thaitien_backend 2>/dev/null || true
            
            sudo docker compose up -d
            sudo docker image prune -f
          EOF
