name: Deploy Thai Tien Shop to AWS

on:
  push:
    branches: [ master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH Key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to Server
        run: |
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no ${{ secrets.USERNAME }}@${{ secrets.HOST }} << 'EOF'
            set -e
            
            # 1. Quản lý thư mục dự án
            if [ ! -d "thaitienshop" ]; then
              git clone https://oauth2:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git thaitienshop
            fi
            cd thaitienshop
            
            # 2. Cập nhật code mới nhất
            git remote set-url origin https://oauth2:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
            git pull origin master
            
            # 3. Dọn dẹp frontend (đã chạy trên Vercel)
            rm -rf frontend
            
            # 4. Cấu hình biến môi trường
            cat <<EOT > .env
            DATABASE_URL=mysql://root:${{ secrets.MYSQL_ROOT_PASSWORD }}@db:3306/thaitienshop
            MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}
            JWT_ACCESS_SECRET=${{ secrets.JWT_ACCESS_SECRET }}
            JWT_REFRESH_SECRET=${{ secrets.JWT_REFRESH_SECRET }}
            JWT_ACCESS_EXPIRES_IN=15m
            JWT_REFRESH_EXPIRES_IN=7d
            RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
            GOOGLE_CALLBACK_URL=https://www.thaitienshop.id.vn/auth/google/callback
            EOT
            
            # 5. Build Image MỚI trước (Bước này tốn RAM nhất)
            sudo docker compose build --pull backend
            
            # 6. Khởi động lại hệ thống
            sudo docker compose up -d
            
            # 7. Dọn dẹp các Image rác
            sudo docker image prune -f
          EOF
