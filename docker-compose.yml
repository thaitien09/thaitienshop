version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: thaitien_db
    restart: always
    environment:
      MYSQL_DATABASE: thaitienshop
      MYSQL_ROOT_PASSWORD: your_strong_password
    ports:
      - "3307:3306"
    volumes:
      - thaitien_db_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password --innodb_buffer_pool_size=512M

  backend:
    build: ./backend
    container_name: thaitien_backend
    restart: always
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: mysql://root:your_strong_password@db:3306/thaitienshop
      PORT: 3000
      JWT_ACCESS_SECRET: your_access_secret
      JWT_REFRESH_SECRET: your_refresh_secret
      # Thêm các biến môi trường khác từ file .env của bạn vào đây
    depends_on:
      - db

volumes:
  thaitien_db_data:
