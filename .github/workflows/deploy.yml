- name: Deploy to Server
  run: |
    ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no ${{ secrets.USERNAME }}@${{ secrets.HOST }} << EOF
      set -e

      if [ ! -d "thaitienshop" ]; then
        git clone https://github.com/${{ github.repository }}.git thaitienshop
      fi

      cd thaitienshop
      git pull origin master

      cat > .env <<EOL
DATABASE_URL=mysql://root:${{ secrets.MYSQL_ROOT_PASSWORD }}@db:3306/thaitienshop
MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}
JWT_ACCESS_SECRET=${{ secrets.JWT_ACCESS_SECRET }}
JWT_REFRESH_SECRET=${{ secrets.JWT_REFRESH_SECRET }}
RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}
GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
GOOGLE_CALLBACK_URL=http://${{ secrets.HOST }}:3000/auth/google/callback
EOL

      docker compose up -d --build || docker-compose up -d --build
      docker image prune -f
    EOF